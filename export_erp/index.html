<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory ERP AI</title>

<style>
:root{
 --bg:#0b1324;
 --card:#1f2a3a;
 --user:#2563eb;
 --bot:#36485c;
 --accent:#22c55e;
}

body{
 margin:0;
 font-family:Segoe UI;
 background:linear-gradient(180deg,#0b1324,#0e1a2f);
 color:white;
 height:100vh;
 display:flex;
 flex-direction:column;
 overflow:hidden;
}

header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 background:#1e293b;
 padding:16px;
 text-align:center;
 font-weight:bold;
 font-size:20px;
 z-index:1000;
 box-shadow:0 4px 12px rgba(0,0,0,.4);
}

#printBtn{
 position:absolute;
 right:20px;
 top:14px;
 background:#22c55e;
 border:none;
 padding:6px 14px;
 border-radius:20px;
 font-size:13px;
 font-weight:bold;
 cursor:pointer;
}

#chat{
 margin-top:75px;
 flex:1;
 overflow-y:auto;
 padding:18px;
 padding-bottom:170px;
 display:flex;
 flex-direction:column;
 gap:14px;
 align-items:stretch;
}

.msg{
 max-width:70%;
 padding:16px 18px;
 border-radius:18px;
 line-height:1.5;
 font-size:15px;
 box-shadow:0 6px 18px rgba(0,0,0,.35);
}

.user{
 align-self:flex-end;
 background:linear-gradient(135deg,#2563eb,#3b82f6);
}

.bot{
 align-self:flex-start;
 background:var(--bot);
 border:1px solid #475569;
}

.report{
 width:100% !important;
 max-width:100% !important;
 align-self:stretch !important;
 background:#ffffff;
 color:#000;
 border-radius:12px;
 padding:10px;
 box-sizing:border-box;
 box-shadow:0 6px 18px rgba(0,0,0,.4);
 overflow-x:auto;
 margin-top:6px;
}

.report table{
 width:100%;
 border-collapse:collapse;
 font-size:12px;
}

.report th,
.report td{
 border:1px solid #ccc;
 padding:4px;
 text-align:center;
}

.report th{
 background:#f3f3f3;
 font-weight:bold;
}

#suggestions{
 position:fixed;
 bottom:95px;
 left:15px;
 right:15px;
 background:#1e293b;
 border-radius:14px;
 border:1px solid #334155;
 display:none;
 max-height:220px;
 overflow-y:auto;
 z-index:999;
}

.suggest-item{
 padding:12px;
 border-bottom:1px solid #334155;
 cursor:pointer;
}

.suggest-item:hover{
 background:#334155;
}

#quickBar{
 position:fixed;
 bottom:65px;
 left:0;
 width:100%;
 overflow-x:auto;
 white-space:nowrap;
 padding:8px 12px;
}

.quick-btn{
 display:inline-block;
 background:#1e293b;
 padding:7px 16px;
 border-radius:25px;
 margin-right:10px;
 font-size:14px;
 cursor:pointer;
}

footer{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 background:#1e293b;
 padding:12px;
 display:flex;
 gap:10px;
}

input{
 flex:1;
 padding:14px;
 border-radius:30px;
 border:none;
 outline:none;
 font-size:16px;
 background:#0f172a;
 color:white;
}

button{
 padding:12px 20px;
 border:none;
 border-radius:30px;
 background:var(--accent);
 font-weight:bold;
 cursor:pointer;
}
</style>
</head>

<body>

<header>
🏭 34" Factory ERP AI
<button id="printBtn" onclick="printChat()">Print</button>
</header>

<div id="chat">
<div class="msg bot">
ওস্তাদ, সিল নম্বর বা কমান্ড লিখুন।
</div>
</div>

<div id="suggestions"></div>

<div id="quickBar">
<span class="quick-btn" onclick="quick('totall')">totall</span>
<span class="quick-btn" onclick="quick('today')">today</span>
<span class="quick-btn" onclick="quick('cpb per day')">cpb per day</span>
<span class="quick-btn" onclick="quick('jigger per day')">jigger per day</span>
<span class="quick-btn" onclick="quick('total dyeing')">total dyeing</span>
</div>

<footer>
<input id="q" placeholder="Type command...">
<button onclick="send()">Send</button>
</footer>

<script>
var chat=document.getElementById("chat");
var input=document.getElementById("q");
var suggestions=document.getElementById("suggestions");

function add(text,type){
 var d=document.createElement("div");

 if(text.includes("<table")){
   d.className="report";
   d.innerHTML=text;
 }else{
   d.className="msg "+type;
   text=text.replace(/\n/g,"<br>");
   d.innerHTML=text;
 }

 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

function send(){
 var text=input.value.trim();
 if(text==="") return;

 add(text,"user");
 input.value="";
 suggestions.style.display="none";

 fetch("/export/api/ask",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({question:text})
 })
 .then(res=>res.json())
 .then(data=>{
  add(data.reply,"bot");
 })
 .catch(()=>{
  add("⚠️ Server error","bot");
 });
}

function quick(t){
 input.value=t;
 send();
}

/* ================= PRINT LAST BOT REPORT ================= */
function printChat(){

 var items=document.querySelectorAll("#chat .report, #chat .bot");
 if(items.length===0) return;

 var last=items[items.length-1].innerHTML;

 var win=window.open("","","width=900,height=700");

 win.document.write(`
 <html>
 <head>
 <title>Production Report</title>
 <style>
  @page{ size:A4 portrait; margin:8mm; }
  body{ font-family:Arial; }
  table{ width:100%; border-collapse:collapse; }
  th,td{ border:1px solid #000; padding:5px; text-align:center; }
  th{ background:#f2f2f2; }
 </style>
 </head>
 <body>
 ${last}
 </body>
 </html>
 `);

 win.document.close();
 win.print();
}
</script>

</body>
</html>
