<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory ERP AI</title>

<style>
:root{
 --bg:#0b1324;
 --card:#1f2a3a;
 --user:#2563eb;
 --bot:#36485c;
 --accent:#22c55e;
}

body{
 margin:0;
 font-family:Segoe UI;
 background:linear-gradient(180deg,#0b1324,#0e1a2f);
 color:white;
 height:100vh;
 display:flex;
 flex-direction:column;
 overflow:hidden;
}

header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 background:#1e293b;
 padding:16px;
 text-align:center;
 font-weight:bold;
 font-size:20px;
 z-index:1000;
 box-shadow:0 4px 12px rgba(0,0,0,.4);
}

#printBtn{
 position:absolute;
 right:20px;
 top:14px;
 background:#22c55e;
 border:none;
 padding:6px 14px;
 border-radius:20px;
 font-size:13px;
 font-weight:bold;
 cursor:pointer;
}

#chat{
 margin-top:75px;
 flex:1;
 overflow-y:auto;
 padding:18px;
 padding-bottom:170px;
 display:flex;
 flex-direction:column;
 gap:14px;
 align-items:stretch;
}

.msg{
 max-width:70%;
 padding:16px 18px;
 border-radius:18px;
 line-height:1.5;
 font-size:15px;
 box-shadow:0 6px 18px rgba(0,0,0,.35);
 word-wrap: break-word;
}

.user{
 align-self:flex-end;
 background:linear-gradient(135deg,#2563eb,#3b82f6);
}

.bot{
 align-self:flex-start;
 background:var(--bot);
 border:1px solid #475569;
}

/* ===== REPORT STYLES - IMPROVED ===== */
.report{
 width:100% !important;
 max-width:100% !important;
 align-self:stretch !important;
 background:#ffffff;
 color:#000;
 border-radius:12px;
 padding:12px;
 box-sizing:border-box;
 box-shadow:0 6px 18px rgba(0,0,0,.4);
 margin-top:6px;
 overflow-x: auto;
}

.report table{
 width:100%;
 border-collapse:collapse;
 font-size:12px;
 min-width: 500px; /* টেবিল ছোট হলে স্ক্রল */
}

.report th{
 background: #2d3748;
 color: white;
 padding: 6px 4px;
 font-size: 11px;
 font-weight: bold;
 text-align: center;
 border: 1px solid #1a202c;
}

.report td{
 padding: 5px 4px;
 border: 1px solid #cbd5e0;
 text-align: center;
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
 max-width: 150px;
}

.report td:first-child {
 font-weight: bold;
 background: #f0f4f8;
 white-space: normal;
}

.report tr:nth-child(even) td {
 background: #f8fafc;
}

/* কালার কোডিং */
.report .positive {
 color: #0b5e0b;
 font-weight: bold;
}

.report .negative {
 color: #b22222;
 font-weight: bold;
}

/* সামারি বক্স */
.report .summary-box {
 background: #edf2f7;
 padding: 8px;
 margin-top: 8px;
 font-size: 12px;
 font-weight: bold;
 border-radius: 4px;
 border-left: 4px solid #2d3748;
}

.report .info-row {
 background: #f0f4f8;
 padding: 6px 8px;
 margin: 5px 0;
 border-radius: 4px;
 font-size: 12px;
 border: 1px solid #cbd5e0;
}

.report .month-header {
 font-size: 14px;
 font-weight: bold;
 color: #2d3748;
 margin-bottom: 8px;
 padding: 5px;
 background: #edf2f7;
 border-radius: 4px;
 text-align: center;
}

/* মোবাইল রেস্পন্সিভ */
@media (max-width: 480px) {
 .report table {
   font-size: 10px;
   min-width: 400px;
 }
 .report td {
   padding: 3px;
   max-width: 100px;
 }
 .report th {
   padding: 4px 2px;
   font-size: 10px;
 }
}

#suggestions{
 position:fixed;
 bottom:95px;
 left:15px;
 right:15px;
 background:#1e293b;
 border-radius:14px;
 border:1px solid #334155;
 display:none;
 max-height:220px;
 overflow-y:auto;
 z-index:999;
}

.suggest-item{
 padding:12px;
 border-bottom:1px solid #334155;
 cursor:pointer;
}

.suggest-item:hover{
 background:#334155;
}

#quickBar{
 position:fixed;
 bottom:65px;
 left:0;
 width:100%;
 overflow-x:auto;
 white-space:nowrap;
 padding:8px 12px;
 z-index:998;
}

.quick-btn{
 display:inline-block;
 background:#1e293b;
 padding:7px 16px;
 border-radius:25px;
 margin-right:10px;
 font-size:14px;
 cursor:pointer;
}

footer{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 background:#1e293b;
 padding:12px;
 display:flex;
 gap:10px;
 z-index:1000;
}

input{
 flex:1;
 padding:14px;
 border-radius:30px;
 border:none;
 outline:none;
 font-size:16px;
 background:#0f172a;
 color:white;
}

button{
 padding:12px 20px;
 border:none;
 border-radius:30px;
 background:var(--accent);
 font-weight:bold;
 cursor:pointer;
}
</style>
</head>

<body>

<header>
🏭 34" Factory ERP AI
<button id="printBtn" onclick="printChat()">Print</button>
</header>

<div id="chat">
<div class="msg bot">
ওস্তাদ, সিল নম্বর বা কমান্ড লিখুন।
</div>
</div>

<div id="suggestions"></div>

<div id="quickBar">
<span class="quick-btn" onclick="quick('totall')">totall</span>
<span class="quick-btn" onclick="quick('today')">today</span>
<span class="quick-btn" onclick="quick('cpb per day')">cpb per day</span>
<span class="quick-btn" onclick="quick('jigger per day')">jigger per day</span>
<span class="quick-btn" onclick="quick('total dyeing')">total dyeing</span>
</div>

<footer>
<input id="q" placeholder="Type command...">
<button onclick="send()">Send</button>
</footer>

<script>
var chat=document.getElementById("chat");
var input=document.getElementById("q");
var suggestions=document.getElementById("suggestions");

function add(text,type){
 var d=document.createElement("div");

 if(text && text.includes("<table")){
   d.className="report";
   
   // টেবিলের জন্য আলাদা wrapper
   var wrapper = document.createElement("div");
   wrapper.style.overflowX = "auto";
   wrapper.style.width = "100%";
   wrapper.innerHTML = text;
   
   d.appendChild(wrapper);
 }else{
   d.className="msg "+type;
   if(text) {
     text=text.replace(/\n/g,"<br>");
     d.innerHTML=text;
   }
 }

 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

function send(){
 var text=input.value.trim();
 if(text==="") return;

 add(text,"user");
 input.value="";
 suggestions.style.display="none";

 // Loading message
 add("⏳ Loading...","bot");
 var loading = chat.lastChild;

 fetch("/export/api/ask",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({question:text})
 })
 .then(res=>res.json())
 .then(data=>{
   // Remove loading message
   if(loading && loading.parentNode) {
     loading.remove();
   }
   add(data.reply || "No reply","bot");
 })
 .catch(()=>{
   if(loading && loading.parentNode) {
     loading.remove();
   }
   add("⚠️ Server error","bot");
 });
}

function quick(t){
 input.value=t;
 send();
}

// Enter key support
input.addEventListener("keypress", function(e) {
  if(e.key === "Enter") send();
});

/* ===================== CORPORATE PRINT ===================== */
function printChat(){

 var bots=document.querySelectorAll(".bot, .report");
 if(bots.length===0) return;

 var lastReport=bots[bots.length-1].innerHTML;
 var now=new Date().toLocaleString('bn-BD', {
   year: 'numeric',
   month: '2-digit',
   day: '2-digit',
   hour: '2-digit',
   minute: '2-digit'
 });

 var win=window.open("","","width=900,height=700");

 win.document.write(`
  <html>
  <head>
   <title>Production Report</title>
   <style>
 @page{
   size:A4 portrait;
   margin:10mm;
 }

 body{
   font-family:Arial;
   margin:0;
   padding:15px;
   zoom:0.9;
 }

 .company{
   font-size:22px;
   font-weight:bold;
   text-align:center;
 }

 .address{
   text-align:center;
   font-size:12px;
   margin-top:4px;
 }

 .title{
   text-align:center;
   font-size:16px;
   font-weight:bold;
   margin-top:10px;
 }

 .meta{
   margin-top:15px;
   font-size:12px;
   background:#f5f5f5;
   padding:8px;
   border-radius:5px;
 }

 table{
   width:100%;
   border-collapse:collapse;
   font-size:11px;
   margin-top:15px;
   page-break-inside:avoid;
 }

 tr{
   page-break-inside:avoid;
 }

 th, td{
   border:1px solid #000;
   padding:5px;
   text-align:center;
 }

 th{
   background:#f2f2f2;
   font-weight:bold;
 }

 .footer{
   margin-top:30px;
   font-size:12px;
   display:flex;
   justify-content:space-between;
   border-top:1px solid #ccc;
   padding-top:15px;
 }

 hr{
   margin:15px 0;
   border:1px solid #ddd;
 }
   </style>
  </head>
  <body>

   <div class="company">Sukhy Dyeing & Finishing Mills Ltd.</div>
   <div class="address">Kurerpar, Sekherchor, Narsingdi.</div>
   <div class="title">34" Factory ERP Production Report</div>
   
   <div class="meta">
     <b>Generated:</b> ${now}<br>
     <b>Query:</b> ${input.value || 'N/A'}
   </div>

   <hr>

   ${lastReport}

   <div class="footer">
     <div>
       <b>Prepared By:</b> Mehedi Hasan<br>
       <b>Developed By:</b> Mehedi Hasan
     </div>
     <div>
       <b>Signature:</b> ________________________
     </div>
   </div>

  </body>
  </html>
 `);

 win.document.close();
 win.print();
}
</script>

</body>
</html>
