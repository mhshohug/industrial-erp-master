<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>34" Factory ERP AI</title>

<style>
* {
  box-sizing: border-box;
}

:root{
 --bg:#0b1324;
 --card:#1f2a3a;
 --user:#2563eb;
 --bot:#36485c;
 --accent:#22c55e;
}

body{
 margin:0;
 font-family:Segoe UI;
 background:linear-gradient(180deg,#0b1324,#0e1a2f);
 color:white;
 height:100vh;
 display:flex;
 flex-direction:column;
 overflow:hidden;
}

header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 background:#1e293b;
 padding:12px 50px 12px 12px;
 text-align:center;
 font-weight:bold;
 font-size:18px;
 z-index:1000;
 box-shadow:0 2px 8px rgba(0,0,0,.4);
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

#printBtn{
 background:#22c55e;
 border:none;
 padding:4px 12px;
 border-radius:16px;
 font-size:12px;
 font-weight:bold;
 cursor:pointer;
 color:white;
 position:absolute;
 right:12px;
 top:8px;
}

#chat{
 position:fixed;
 top:55px;
 bottom:120px;
 left:0;
 right:0;
 overflow-y:auto;
 padding:12px;
 display:flex;
 flex-direction:column;
 gap:8px;
}

.msg{
 max-width:85%;
 padding:10px 14px;
 border-radius:14px;
 line-height:1.4;
 font-size:14px;
 word-wrap:break-word;
}

.user{
 align-self:flex-end;
 background:#2563eb;
}

.bot{
 align-self:flex-start;
 background:#1f2937;
 border:1px solid #374151;
}

/* ===== রিপোর্ট স্টাইল - কোনো স্ক্রল ছাড়াই ===== */
.report{
 width:100%;
 background:white;
 color:black;
 border-radius:8px;
 padding:8px;
 margin:5px 0;
 box-sizing:border-box;
 box-shadow:0 2px 8px rgba(0,0,0,.3);
 font-size:12px;
 max-width:100%;
}

.report .header{
 font-weight:bold;
 font-size:14px;
 margin-bottom:5px;
 color:#1e293b;
}

/* টেবিল অটো-ফিট - কোনো স্ক্রল নেই */
.report table{
 width:100%;
 border-collapse:collapse;
 margin:3px 0;
 font-size:11px;
 table-layout:auto;
 word-break:break-word;
}

.report th{
 background:#e5e7eb;
 color:#1f2937;
 padding:4px 2px;
 text-align:center;
 font-weight:600;
 border:1px solid #d1d5db;
 font-size:11px;
}

.report td{
 padding:3px 2px;
 border:1px solid #d1d5db;
 text-align:center;
 word-break:break-word;
 font-size:11px;
}

/* টেক্সট মোড়ানো হবে, স্ক্রল হবে না */
.report td {
  white-space: normal !important;
  max-width: none !important;
}

/* কলামের প্রস্থ অটো অ্যাডজাস্ট */
.report table {
  width: 100%;
  max-width: 100%;
}

.report .total-row{
 font-weight:bold;
 background:#f3f4f6;
}

.report .summary{
 margin-top:3px;
 padding:4px;
 background:#f3f4f6;
 border-radius:4px;
 font-weight:500;
 font-size:11px;
}

.report .positive{
 color:#059669;
 font-weight:bold;
}

.report .negative{
 color:#dc2626;
 font-weight:bold;
}

.report .info-line{
 padding:2px 0;
 border-bottom:1px dashed #d1d5db;
 margin:2px 0;
 font-size:11px;
}

/* ===== কুইক বার ===== */
#quickBar{
 position:fixed;
 bottom:65px;
 left:0;
 width:100%;
 overflow-x:auto;
 white-space:nowrap;
 padding:8px 10px;
 z-index:998;
 background:transparent;
 -webkit-overflow-scrolling:touch;
}

.quick-btn{
 display:inline-block;
 background:#1e293b;
 padding:6px 16px;
 border-radius:20px;
 margin-right:8px;
 font-size:13px;
 cursor:pointer;
 border:1px solid #334155;
}

.quick-btn:hover{
 background:#334155;
}

/* ===== ফুটার ===== */
footer{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 background:#1e293b;
 padding:10px;
 display:flex;
 gap:8px;
 z-index:1000;
}

input{
 flex:1;
 padding:12px 16px;
 border-radius:24px;
 border:none;
 outline:none;
 font-size:14px;
 background:#0f172a;
 color:white;
}

input::placeholder{
 color:#94a3b8;
 font-size:13px;
}

button{
 padding:10px 20px;
 border:none;
 border-radius:24px;
 background:#22c55e;
 color:white;
 font-weight:bold;
 font-size:14px;
 cursor:pointer;
 min-width:70px;
}

button:hover{
 background:#16a34a;
}

/* ===== স্ক্রলবার কাস্টমাইজ ===== */
#chat::-webkit-scrollbar {
  width: 5px;
}
#chat::-webkit-scrollbar-track {
  background: #1e293b;
}
#chat::-webkit-scrollbar-thumb {
  background: #22c55e;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
<span>34" Factory ERP AI</span>
<button id="printBtn" onclick="printChat()">Print</button>
</header>

<div id="chat">
<div class="msg bot">
ওস্তাদ, সিল নম্বর বা কমান্ড লিখুন।
</div>
</div>

<div id="quickBar">
<span class="quick-btn" onclick="quick('totall')">totall</span>
<span class="quick-btn" onclick="quick('today')">today</span>
<span class="quick-btn" onclick="quick('cpb per day')">cpb per day</span>
<span class="quick-btn" onclick="quick('jigger per day')">jigger per day</span>
<span class="quick-btn" onclick="quick('total dyeing')">total dyeing</span>
</div>

<footer>
<input id="q" placeholder="Type command...">
<button onclick="send()">Send</button>
</footer>

<script>
var chat = document.getElementById("chat");
var input = document.getElementById("q");

// অটো স্ক্রল টু বটম
function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function add(text, type){
  var d = document.createElement("div");

  if(text && text.includes("<table")){
    d.className = "report";
    d.innerHTML = text;
  } else {
    d.className = "msg " + type;
    if(text) {
      text = text.replace(/\n/g, "<br>");
      d.innerHTML = text;
    }
  }

  chat.appendChild(d);
  scrollToBottom();
}

function send(){
  var text = input.value.trim();
  if(text === "") return;

  add(text, "user");
  input.value = "";

  // Loading
  add("⏳ Loading...", "bot");
  var loading = chat.lastChild;

  fetch("/export/api/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({question: text})
  })
  .then(res => res.json())
  .then(data => {
    if(loading && loading.parentNode) {
      loading.remove();
    }
    add(data.reply || "No reply", "bot");
  })
  .catch(() => {
    if(loading && loading.parentNode) {
      loading.remove();
    }
    add("⚠️ Server error", "bot");
  });
}

function quick(t){
  input.value = t;
  send();
}

// Enter key
input.addEventListener("keypress", function(e) {
  if(e.key === "Enter") send();
});

// Print function
function printChat(){
  var reports = document.querySelectorAll(".report");
  if(reports.length === 0) return;

  var lastReport = reports[reports.length-1].innerHTML;
  var now = new Date().toLocaleString('en-US', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });

  var win = window.open("", "", "width=900,height=700");
  win.document.write(`
  <html>
  <head>
    <title>Production Report</title>
    <style>
      body { 
        font-family: Arial; 
        padding: 20px; 
        max-width: 1000px;
        margin: 0 auto;
      }
      .company { 
        font-size: 22px; 
        font-weight: bold; 
        text-align: center;
        color: #1a202c;
      }
      .address { 
        text-align: center; 
        font-size: 12px; 
        margin-top: 4px;
        color: #4a5568;
      }
      .title { 
        text-align: center; 
        font-size: 16px; 
        font-weight: bold; 
        margin: 15px 0;
        color: #2d3748;
      }
      .meta {
        background: #f7fafc;
        padding: 8px;
        border-radius: 4px;
        margin: 10px 0;
        font-size: 12px;
      }
      table { 
        width: 100%; 
        border-collapse: collapse; 
        margin: 15px 0;
        font-size: 12px;
        table-layout: auto;
      }
      th, td { 
        border: 1px solid #000; 
        padding: 6px; 
        text-align: center; 
        word-break: break-word;
      }
      th { 
        background: #f2f2f2; 
      }
      .footer { 
        margin-top: 30px; 
        display: flex; 
        justify-content: space-between; 
        font-size: 12px;
        border-top: 1px solid #ccc;
        padding-top: 15px;
      }
      hr {
        margin: 10px 0;
        border: 1px solid #e2e8f0;
      }
    </style>
  </head>
  <body>
    <div class="company">Sukhy Dyeing & Finishing Mills Ltd.</div>
    <div class="address">Kurerpar, Sekherchor, Narsingdi.</div>
    <div class="title">34" Factory ERP Report</div>
    
    <div class="meta">
      <b>Generated:</b> ${now}<br>
      <b>Query:</b> ${input.value || 'N/A'}
    </div>

    <hr>

    ${lastReport}

    <div class="footer">
      <div>
        <b>Prepared By:</b> Mehedi Hasan<br>
        <b>Developed By:</b> Mehedi Hasan
      </div>
      <div>
        <b>Signature:</b> ________________________
      </div>
    </div>
  </body>
  </html>
  `);
  win.document.close();
  win.print();
}

// উইন্ডো রিসাইজ হলে স্ক্রল ঠিক রাখে
window.addEventListener('resize', function() {
  scrollToBottom();
});
</script>

</body>
</html>
